<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÁNIMA — Criatura de Tinta Viva</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@1&family=Cinzel:wght@300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #05030a;
    overflow: hidden;
    cursor: none;
    font-family: 'Cinzel', serif;
  }
  canvas { display: block; position: fixed; inset: 0; }
  #ui {
    position: fixed; bottom: 2.5rem; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 2.5rem; align-items: center;
    z-index: 10; pointer-events: none;
  }
  .hint {
    font-family: 'IM Fell English', serif; font-style: italic;
    font-size: .78rem; letter-spacing: 3px;
    color: rgba(255,255,255,.18);
    white-space: nowrap;
    animation: breatheText 4s ease-in-out infinite;
  }
  @keyframes breatheText { 0%,100%{opacity:.18} 50%{opacity:.45} }
  #title {
    position: fixed; top: 2.8rem; left: 50%; transform: translateX(-50%);
    font-family: 'Cinzel', serif; font-weight: 300;
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    letter-spacing: 14px; color: rgba(255,255,255,.12);
    z-index: 10; white-space: nowrap;
    animation: titleFade 3s ease both;
  }
  @keyframes titleFade { from{opacity:0;letter-spacing:30px} to{opacity:1;letter-spacing:14px} }
  #mood-label {
    position: fixed; top: 5.5rem; left: 50%; transform: translateX(-50%);
    font-family: 'IM Fell English', serif; font-style: italic;
    font-size: .75rem; letter-spacing: 5px;
    color: rgba(255,255,255,.15); z-index: 10;
    transition: color 1.5s, opacity 1s;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="title">Á &nbsp; N &nbsp; I &nbsp; M &nbsp; A</div>
<div id="mood-label">durmiendo...</div>
<div id="ui">
  <span class="hint">acércate · toca · arrastra</span>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const moodEl = document.getElementById('mood-label');

let W, H, cx, cy;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

/* ─── MOUSE / TOUCH ─── */
let mouse = { x: W/2, y: H/2, vx: 0, vy: 0, px: W/2, py: H/2, down: false, inside: false };
window.addEventListener('mousemove', e => {
  mouse.vx = e.clientX - mouse.x;
  mouse.vy = e.clientY - mouse.y;
  mouse.px = mouse.x; mouse.py = mouse.y;
  mouse.x = e.clientX; mouse.y = e.clientY;
});
window.addEventListener('mousedown', e => { mouse.down = true; onInteract(e.clientX, e.clientY); });
window.addEventListener('mouseup', () => mouse.down = false);
window.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouse.vx = t.clientX - mouse.x; mouse.vy = t.clientY - mouse.y;
  mouse.x = t.clientX; mouse.y = t.clientY;
}, { passive: false });
window.addEventListener('touchstart', e => {
  const t = e.touches[0];
  mouse.x = t.clientX; mouse.y = t.clientY; mouse.down = true;
  onInteract(t.clientX, t.clientY);
});
window.addEventListener('touchend', () => mouse.down = false);

/* ─── PALETAS DE HUMOR ─── */
const moods = [
  { name: 'durmiendo...',  bg: '#05030a', body: [20,10,40],  ink: [80,60,160],  glow: [100,80,200], accent: [200,160,255] },
  { name: 'curioso...',    bg: '#030a0a', body: [10,40,35],  ink: [40,160,140], glow: [60,220,200], accent: [180,255,240] },
  { name: 'excitado...',   bg: '#0a0305', body: [50,10,15],  ink: [200,50,80],  glow: [255,80,120], accent: [255,200,210] },
  { name: 'eufórico...',   bg: '#080a02', body: [30,45,5],   ink: [140,220,40], glow: [200,255,80], accent: [240,255,180] },
  { name: 'en trance...',  bg: '#06050a', body: [35,10,50],  ink: [160,60,220], glow: [200,100,255],accent: [230,180,255] },
];
let currentMood = 0, targetMood = 0;
let moodBlend = 0;

function lerpColor(a, b, t) {
  return [
    a[0] + (b[0]-a[0])*t,
    a[1] + (b[1]-a[1])*t,
    a[2] + (b[2]-a[2])*t,
  ];
}
function rgb(c, a=1) { return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`; }

/* ─── TENTÁCULOS ─── */
const NUM_TENTACLES = 14;
const SEG = 22;
const tentacles = [];

class Segment {
  constructor(x, y) { this.x = x; this.y = y; this.vx = 0; this.vy = 0; }
}

class Tentacle {
  constructor(angleOffset, lengthScale, thickness, phaseOffset) {
    this.angleOffset = angleOffset;
    this.lengthScale = lengthScale;
    this.thickness = thickness;
    this.phaseOffset = phaseOffset;
    this.segs = [];
    for (let i = 0; i <= SEG; i++) this.segs.push(new Segment(cx, cy));
    this.baseLen = 12 + lengthScale * 6;
    this.excited = 0;
  }
  update(body, t, mood) {
    const lead = this.segs[0];
    const angle = this.angleOffset + Math.sin(t * 0.0008 + this.phaseOffset) * 0.6;
    const wave = Math.sin(t * 0.0015 + this.phaseOffset) * (0.3 + this.excited * 0.5);
    const targX = body.x + Math.cos(angle) * (body.r * 0.7) + wave * 20;
    const targY = body.y + Math.sin(angle) * (body.r * 0.7) + wave * 10;
    lead.vx += (targX - lead.x) * 0.25;
    lead.vy += (targY - lead.y) * 0.25;
    lead.vx *= 0.7; lead.vy *= 0.7;
    lead.x += lead.vx; lead.y += lead.vy;

    for (let i = 1; i <= SEG; i++) {
      const prev = this.segs[i-1], curr = this.segs[i];
      const dx = curr.x - prev.x, dy = curr.y - prev.y;
      const dist = Math.sqrt(dx*dx+dy*dy) || 0.001;
      const segLen = this.baseLen * (1 - i/SEG * 0.4) * (1 + this.excited * 0.4);
      const tx = prev.x + dx/dist * segLen;
      const ty = prev.y + dy/dist * segLen;
      const phase = t * 0.0012 + this.phaseOffset + i * 0.35;
      const undX = Math.sin(phase) * (2 + this.excited * 8) * (i/SEG);
      const undY = Math.cos(phase * 1.3) * (1.5 + this.excited * 5) * (i/SEG);
      curr.vx += (tx + undX - curr.x) * 0.3;
      curr.vy += (ty + undY - curr.y) * 0.3;
      curr.vx *= 0.72; curr.vy *= 0.72;
      curr.x += curr.vx; curr.y += curr.vy;
    }
    this.excited *= 0.97;
  }

  draw(t, inkC, glowC, accentC) {
    if (this.segs.length < 2) return;
    const nS = this.segs.length;
    ctx.save();
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    for (let pass = 0; pass < 3; pass++) {
      ctx.beginPath();
      ctx.moveTo(this.segs[0].x, this.segs[0].y);
      for (let i = 1; i < nS; i++) {
        const mx2 = (this.segs[i].x + this.segs[i-1].x)/2;
        const my2 = (this.segs[i].y + this.segs[i-1].y)/2;
        ctx.quadraticCurveTo(this.segs[i-1].x, this.segs[i-1].y, mx2, my2);
      }
      const passAlpha = [0.04, 0.08, 0.9][pass];
      const passWidth = [this.thickness*8, this.thickness*3, this.thickness][pass];
      ctx.strokeStyle = pass < 2 ? rgb(glowC, passAlpha) : rgb(inkC, 0.85);
      ctx.lineWidth = passWidth * (1 + this.excited * 0.5);
      ctx.shadowBlur = pass < 2 ? 30 : 0;
      ctx.shadowColor = rgb(glowC);
      ctx.stroke();
    }
    const tip = this.segs[nS-1];
    const tipGrad = ctx.createRadialGradient(tip.x, tip.y, 0, tip.x, tip.y, this.thickness * 4);
    tipGrad.addColorStop(0, rgb(accentC, 0.6 + this.excited * 0.4));
    tipGrad.addColorStop(1, rgb(glowC, 0));
    ctx.beginPath();
    ctx.arc(tip.x, tip.y, this.thickness * (4 + this.excited * 6), 0, Math.PI*2);
    ctx.fillStyle = tipGrad;
    ctx.fill();
    ctx.restore();
  }
}

for (let i = 0; i < NUM_TENTACLES; i++) {
  const angle = (i / NUM_TENTACLES) * Math.PI * 2;
  tentacles.push(new Tentacle(
    angle,
    0.6 + Math.random() * 0.8,
    1.2 + Math.random() * 2,
    Math.random() * Math.PI * 2
  ));
}

/* ─── CUERPO PRINCIPAL ─── */
const body = {
  x: cx, y: cy, tx: cx, ty: cy,
  vx: 0, vy: 0,
  r: 0, tr: 60,
  breathPhase: 0,
  excited: 0,
  fear: 0,
  pulseBeat: 0,
  numBlobs: 8,
  blobAngles: Array.from({length:8},(_,i)=>i/8*Math.PI*2),
  blobRadii: Array.from({length:8},()=>0.8+Math.random()*0.4),
};

/* ─── PARTÍCULAS ─── */
const particles = [];
class Particle {
  constructor(x, y, color, burst) {
    this.x = x; this.y = y;
    const spd = burst ? (4 + Math.random() * 14) : (1 + Math.random() * 4);
    const a = Math.random() * Math.PI * 2;
    this.vx = Math.cos(a) * spd;
    this.vy = Math.sin(a) * spd - (burst ? 3 : 0);
    this.life = 1;
    this.decay = burst ? (0.01 + Math.random() * 0.025) : (0.005 + Math.random() * 0.01);
    this.r = burst ? (2 + Math.random() * 5) : (1 + Math.random() * 2);
    this.color = color;
    this.trail = [];
    this.gravity = burst ? 0.12 : 0.02;
    this.glow = burst;
  }
  update() {
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 6) this.trail.shift();
    this.vx *= 0.97; this.vy += this.gravity;
    this.x += this.vx; this.y += this.vy;
    this.life -= this.decay;
  }
  draw() {
    if (this.glow && this.trail.length > 1) {
      ctx.save();
      ctx.strokeStyle = rgb(this.color, this.life * 0.4);
      ctx.lineWidth = this.r * 0.8;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(this.trail[0].x, this.trail[0].y);
      for (const p of this.trail) ctx.lineTo(p.x, p.y);
      ctx.stroke();
      ctx.restore();
    }
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r * (this.glow ? 3 : 2));
    g.addColorStop(0, rgb(this.color, this.life));
    g.addColorStop(1, rgb(this.color, 0));
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * (this.glow ? 3 : 2), 0, Math.PI*2);
    ctx.fillStyle = g;
    ctx.fill();
  }
}

/* ─── INTERACCIÓN ─── */
function onInteract(x, y) {
  const dx = x - body.x, dy = y - body.y;
  const dist = Math.sqrt(dx*dx+dy*dy);
  if (dist < body.r * 2.5) {
    body.excited = Math.min(body.excited + 1.5, 3);
    tentacles.forEach(t => t.excited += 1.2 + Math.random());
    const burst = Math.floor(40 + body.excited * 30);
    const ac = getMoodColor('accent');
    for (let i = 0; i < burst; i++) particles.push(new Particle(x, y, ac, true));
    targetMood = (targetMood + 1) % moods.length;
  } else {
    body.excited = Math.min(body.excited + 0.4, 3);
    tentacles.forEach(t => t.excited += 0.3);
  }
}

/* ─── COLOR HELPERS ─── */
function getMoodColor(key) {
  const a = moods[currentMood][key];
  const b = moods[targetMood][key];
  return lerpColor(a, b, moodBlend);
}

/* ─── CURSOR ─── */
function drawCursor() {
  const x = mouse.x, y = mouse.y;
  const spd = Math.sqrt(mouse.vx**2 + mouse.vy**2);
  ctx.save();
  ctx.globalAlpha = 0.7;
  const g = ctx.createRadialGradient(x,y,0,x,y,10+spd*0.3);
  g.addColorStop(0, rgb(getMoodColor('accent'), 0.9));
  g.addColorStop(1, rgb(getMoodColor('glow'), 0));
  ctx.beginPath(); ctx.arc(x, y, 10+spd*0.3, 0, Math.PI*2);
  ctx.fillStyle = g; ctx.fill();
  ctx.restore();
}

/* ─── BACKGROUND ─── */
function drawBackground(t) {
  const bgHex = moods[targetMood].bg;
  ctx.fillStyle = `rgba(${parseInt(bgHex.slice(1,3),16)},${parseInt(bgHex.slice(3,5),16)},${parseInt(bgHex.slice(5,7),16)},0.18)`;
  ctx.fillRect(0, 0, W, H);
}

/* ─── CUERPO ─── */
function drawBody(t) {
  const bodyC = getMoodColor('body');
  const inkC = getMoodColor('ink');
  const glowC = getMoodColor('glow');

  body.breathPhase += 0.018 + body.excited * 0.008;
  const breathe = Math.sin(body.breathPhase) * 8 * (1 + body.excited * 0.5);
  const R = body.r + breathe;

  for (let ring = 3; ring >= 0; ring--) {
    const rAlpha = [0.02, 0.04, 0.06, 0.08][ring];
    const rScale = [2.8, 2.0, 1.5, 1.1][ring];
    const rg = ctx.createRadialGradient(body.x, body.y, 0, body.x, body.y, R * rScale);
    rg.addColorStop(0, rgb(glowC, rAlpha * (1 + body.excited * 0.5)));
    rg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(body.x, body.y, R * rScale, 0, Math.PI*2);
    ctx.fillStyle = rg; ctx.fill();
  }

  ctx.save();
  ctx.beginPath();
  const n = body.numBlobs;
  for (let i = 0; i <= n; i++) {
    const idx = i % n;
    const nextIdx = (i+1) % n;
    body.blobAngles[idx] += 0.003 + idx * 0.0005;
    const wave = Math.sin(t * 0.001 + idx * 1.3) * (6 + body.excited * 12);
    const cr = (body.blobRadii[idx] * R + wave);
    const px2 = body.x + Math.cos(body.blobAngles[idx]) * cr;
    const py2 = body.y + Math.sin(body.blobAngles[idx]) * cr;
    const nx = body.blobAngles[nextIdx];
    const nwave = Math.sin(t * 0.001 + nextIdx * 1.3) * (6 + body.excited * 12);
    const nr = body.blobRadii[nextIdx] * R + nwave;
    const cpx = body.x + Math.cos((body.blobAngles[idx]+nx)/2) * (cr+nr)/2 * 1.15;
    const cpy = body.y + Math.sin((body.blobAngles[idx]+nx)/2) * (cr+nr)/2 * 1.15;
    if (i === 0) ctx.moveTo(px2, py2);
    else ctx.quadraticCurveTo(cpx, cpy, px2, py2);
  }
  ctx.closePath();
  const bodyGrad = ctx.createRadialGradient(body.x - R*0.2, body.y - R*0.2, R*0.1, body.x, body.y, R*1.1);
  bodyGrad.addColorStop(0, rgb(inkC, 0.9));
  bodyGrad.addColorStop(0.6, rgb(bodyC, 0.85));
  bodyGrad.addColorStop(1, rgb(glowC, 0.3));
  ctx.fillStyle = bodyGrad;
  ctx.shadowBlur = 30 + body.excited * 20;
  ctx.shadowColor = rgb(glowC, 0.5);
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.globalAlpha = 0.3 + body.excited * 0.1;
  const shim = ctx.createRadialGradient(body.x - R*0.25, body.y - R*0.3, 0, body.x - R*0.1, body.y - R*0.1, R*0.6);
  shim.addColorStop(0, rgb(getMoodColor('accent'), 0.6));
  shim.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(body.x, body.y, R, 0, Math.PI*2);
  ctx.fillStyle = shim; ctx.fill();
  ctx.restore();

  drawEyes(R, t);
}

function drawEyes(R, t) {
  const eyeOffset = R * 0.3;
  const eyes = [
    { ox: -eyeOffset * 0.7, oy: -eyeOffset * 0.3 },
    { ox:  eyeOffset * 0.7, oy: -eyeOffset * 0.3 },
  ];
  const glowC = getMoodColor('glow');
  const accentC = getMoodColor('accent');

  eyes.forEach(e => {
    const ex = body.x + e.ox;
    const ey = body.y + e.oy;
    const eyeR = R * 0.18;

    const dx = mouse.x - ex, dy = mouse.y - ey;
    const dist = Math.sqrt(dx*dx+dy*dy) || 1;
    const pupilDist = eyeR * 0.35;
    const px2 = ex + (dx/dist) * pupilDist;
    const py2 = ey + (dy/dist) * pupilDist;

    const eg = ctx.createRadialGradient(ex, ey-eyeR*0.2, 0, ex, ey, eyeR);
    eg.addColorStop(0, rgb(accentC, 0.95));
    eg.addColorStop(0.7, rgb(glowC, 0.6));
    eg.addColorStop(1, rgb(glowC, 0.1));
    ctx.beginPath(); ctx.arc(ex, ey, eyeR, 0, Math.PI*2);
    ctx.fillStyle = eg; ctx.fill();

    const pupilR = eyeR * (0.38 + body.excited * 0.12);
    const pg = ctx.createRadialGradient(px2, py2, 0, px2, py2, pupilR);
    pg.addColorStop(0, 'rgba(5,3,10,1)');
    pg.addColorStop(0.6, 'rgba(5,3,10,0.9)');
    pg.addColorStop(1, rgb(glowC, 0.2));
    ctx.beginPath(); ctx.arc(px2, py2, pupilR, 0, Math.PI*2);
    ctx.fillStyle = pg; ctx.fill();

    ctx.beginPath(); ctx.arc(px2 - pupilR*0.25, py2 - pupilR*0.3, pupilR*0.22, 0, Math.PI*2);
    ctx.fillStyle = rgb(accentC, 0.7); ctx.fill();

    ctx.save();
    ctx.shadowBlur = 20; ctx.shadowColor = rgb(glowC, 0.8);
    ctx.beginPath(); ctx.arc(ex, ey, eyeR, 0, Math.PI*2);
    ctx.strokeStyle = rgb(glowC, 0.4); ctx.lineWidth = 1.5; ctx.stroke();
    ctx.restore();
  });
}

/* ─── AMBIENT PARTICLES ─── */
let lastAmbient = 0;
function spawnAmbient(t) {
  if (t - lastAmbient < 120) return;
  lastAmbient = t;
  if (Math.random() < 0.4 + body.excited * 0.3) {
    const angle = Math.random() * Math.PI * 2;
    const dist = body.r * (0.5 + Math.random() * 0.7);
    const px = body.x + Math.cos(angle) * dist;
    const py = body.y + Math.sin(angle) * dist;
    particles.push(new Particle(px, py, getMoodColor('accent'), false));
  }
}

/* ─── MAIN LOOP ─── */
let t = 0;
function loop() {
  requestAnimationFrame(loop);
  t += 16;

  if (currentMood !== targetMood) {
    moodBlend += 0.012;
    if (moodBlend >= 1) { moodBlend = 0; currentMood = targetMood; }
    moodEl.textContent = moods[targetMood].name;
    moodEl.style.color = `rgba(255,255,255,${0.12+moodBlend*0.25})`;
  } else {
    moodEl.style.color = 'rgba(255,255,255,0.15)';
  }

  drawBackground(t);

  const dx = mouse.x - body.x, dy = mouse.y - body.y;
  const dist = Math.sqrt(dx*dx + dy*dy);

  const attractDist = 220;
  if (dist > attractDist) {
    body.tx = body.x + dx * 0.003;
    body.ty = body.y + dy * 0.003;
  } else if (dist < 80) {
    body.tx = body.x - dx * 0.008;
    body.ty = body.y - dy * 0.008;
    body.fear = Math.min(body.fear + 0.05, 1);
  } else {
    body.fear *= 0.95;
  }
  body.vx += (body.tx - body.x) * 0.04;
  body.vy += (body.ty - body.y) * 0.04;
  const margin = 80;
  if (body.x < margin) body.vx += 0.5;
  if (body.x > W-margin) body.vx -= 0.5;
  if (body.y < margin) body.vy += 0.5;
  if (body.y > H-margin) body.vy -= 0.5;
  body.vx *= 0.88; body.vy *= 0.88;
  body.x += body.vx; body.y += body.vy;

  body.tr = 55 + body.excited * 20 + body.fear * -10;
  body.r += (body.tr - body.r) * 0.04;
  body.excited *= 0.985;

  body.inside = dist < body.r * 2;
  if (mouse.down && dist < body.r * 3) {
    body.excited = Math.min(body.excited + 0.08, 3);
    tentacles.forEach(t2 => t2.excited += 0.04);
    const ac = getMoodColor('accent');
    if (Math.random() < 0.3) particles.push(new Particle(
      body.x + (Math.random()-.5)*body.r,
      body.y + (Math.random()-.5)*body.r, ac, false
    ));
  }

  tentacles.forEach(tent => {
    tent.update(body, t, currentMood);
    tent.draw(t, getMoodColor('ink'), getMoodColor('glow'), getMoodColor('accent'));
  });

  drawBody(t);

  spawnAmbient(t);
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].draw();
    if (particles[i].life <= 0) particles.splice(i, 1);
  }

  drawCursor();

  if (Math.random() < 0.004) {
    body.tx = margin*2 + Math.random() * (W - margin*4);
    body.ty = margin*2 + Math.random() * (H - margin*4);
  }
  if (Math.random() < 0.0003 && currentMood === targetMood) {
    targetMood = Math.floor(Math.random() * moods.length);
  }
}

body.r = 0; body.tr = 60;
setTimeout(() => {
  const ac = moods[0].accent;
  for (let i = 0; i < 30; i++) particles.push(new Particle(cx, cy, ac, true));
}, 800);

loop();
</script>
</body>
</html>
